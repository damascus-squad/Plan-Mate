name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  run-tests:
    name: Execute Tests & Generate Kover Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: Run Tests and Generate Kover Report
        run: ./gradlew koverXmlReport koverHtmlReport

      - name: Upload Kover Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage-report
          path: build/reports/kover/

      - name: Verify Coverage Thresholds
        run: ./gradlew koverVerify

  analyze-pr:
    name: Analyze PR Code Coverage
    needs: run-tests
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Kover Report
        uses: actions/download-artifact@v4
        with:
          name: kover-coverage-report
          path: build/reports/kover/

      - name: Add Coverage Results to PR
        id: kover
        uses: mi-kas/kover-report@v1
        with:
          path: ${{ github.workspace }}/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          update-comment: true
          title: Code Coverage Summary